[build]
  command = "npm run build"
  publish = "dist"

# NHL API proxy handled by netlify/edge-functions/nhl-proxy.ts
# (follows redirects server-side, avoiding CORS from NHL's /standings/now → /standings/date redirect)

# SPA fallback — all client-side routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
